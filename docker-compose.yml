version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_nuvemhub
    restart: unless-stopped
    environment:
      POSTGRES_USER: nuvemhub_user
      POSTGRES_PASSWORD: nuvemhub_password
      POSTGRES_DB: nuvemhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
